project:
  name: air_quality_stability
  random_seed: 42

data:
  raw_path: data/raw/air_quality.csv
  target_column: pm25
  test_size: 0.2

preprocessing:
  handle_missing: median
  outlier_threshold: 1.5
  scale_features: true

model:
  type: random_forest
  n_estimators: 100
  max_depth: 10

outputs:
  figures_dir: outputs/figures
